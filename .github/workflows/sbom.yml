name: Generate SBOM

on:
  workflow_call:
    inputs:
      image:
        description: "Container image to scan (e.g., ghcr.io/misfitdev/app:sha-abc123). Leave empty for source scan."
        required: false
        type: string
      format:
        description: "SBOM format: spdx-json or cyclonedx-json"
        required: false
        type: string
        default: "spdx-json"
      attach-to-release:
        description: "Attach SBOM to the GitHub release for the current tag"
        required: false
        type: boolean
        default: false

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.image == '' }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image || '' }}
          path: ${{ inputs.image == '' && '.' || '' }}
          format: ${{ inputs.format }}
          artifact-name: sbom
          output-file: sbom.${{ inputs.format == 'cyclonedx-json' && 'cdx' || 'spdx' }}.json

      - name: Attach SBOM to release
        if: ${{ inputs.attach-to-release && github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" sbom.*.json --clobber
