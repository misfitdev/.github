name: Security Scan

on:
  workflow_call:
    inputs:
      semgrep-config:
        description: "Semgrep ruleset config"
        required: false
        type: string
        default: "auto"
      trivy-scan-type:
        description: "Trivy scan type: fs, image, repo"
        required: false
        type: string
        default: "fs"
      trivy-target:
        description: "Trivy scan target (path or image ref)"
        required: false
        type: string
        default: "."
      trivy-severity:
        description: "Trivy severity filter"
        required: false
        type: string
        default: "CRITICAL,HIGH"

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        run: semgrep scan --config ${{ inputs.semgrep-config }} --sarif --output semgrep.sarif .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.trivy-scan-type != 'image' }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: ${{ inputs.trivy-scan-type }}
          scan-ref: ${{ inputs.trivy-target }}
          severity: ${{ inputs.trivy-severity }}
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
